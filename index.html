<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>ToDo List</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>ToDo List!</h1>

        <div class="row">

            <input
                id="taskInput"
                placeholder="Add your new ToDo...">

            <button onclick="addTask()">
                +
            </button>

        </div>

        <div id="tasks"></div>

    </div>

    <div
        class="modal hidden"
        id="appModal"
        aria-hidden="true">

        <div class="modal-box" role="dialog" aria-modal="true">

            <h2 id="modalTitle"></h2>

            <p id="modalMessage"></p>

            <input id="modalInput">

            <div class="modal-actions">

                <button class="modal-cancel" id="modalCancel">
                    Cancel
                </button>

                <button class="modal-ok" id="modalOk">
                    OK
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
